    /* --- New Hamburger Menu Styles --- */
.hamburger-btn {
  display: none; /* Hidden on PC */
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 10px;
  z-index: 1001;
}

.hamburger-btn span {
  display: block;
  width: 25px;
  height: 3px;
  background: #2952c8;
  border-radius: 2px;
  transition: 0.3s;
}

/* Mobile logic for screens smaller than 980px */
@media (max-width: 980px) {
  .hamburger-btn { display: flex; } 

  .nav-menu-container {
    display: none; /* Hide links by default on mobile */
    position: absolute;
    top: 68px; 
    left: 0;
    width: 100%;
    background: #ffffff;
    flex-direction: column;
    padding: 20px;
    gap: 15px !important;
    border-bottom: 3px solid #2952c8;

/* Custom fix for the Top Contact Bar */
@media (max-width: 600px) {
  .top-contact-bar {

/* ── TripCard ── */
function TripCard({trip, onBook}) {
  const [hovered, setHovered] = useState(false);
  const price = trip.price || 0;
  const eur = Math.round(price * PLN_TO_EUR);
  const showPrice = trip.showPrice === true;
  return (
    <div
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}
      className="trip-card-responsive"
      style={{background:'#fff',border:'1px solid #dde4f5',borderRadius:14,overflow:'hidden',
        boxShadow:hovered?'0 8px 40px rgba(41,82,200,0.18)':'0 2px 16px rgba(41,82,200,0.10)',
        display:'grid',gridTemplateColumns:'300px 1fr',
        transform:hovered?'translateY(-2px)':'none',transition:'box-shadow 0.2s,transform 0.2s',cursor:'pointer'}}
    >
      {/* Image Panel */}
      <div style={{position:'relative',minHeight:220,background:trip.imgBg||'linear-gradient(145deg,#1a3a9e,#2952c8)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
        {trip.photo ? (
          <img src={trip.photo} alt={trip.title} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}} />
        ) : (
          <>
            <span style={{fontSize:'7rem',opacity:0.25,position:'absolute'}}>{trip.emojiBg}</span>
            <span style={{fontSize:'5rem',position:'relative',zIndex:1,filter:'drop-shadow(0 4px 12px rgba(0,0,0,0.3))'}}>{trip.emoji}</span>
          </>
        )}
        <div style={{position:'absolute',top:12,left:12,display:'flex',flexDirection:'column',gap:6,zIndex:2}}>
          {(trip.badges||[]).map(b=>(
            <span key={b.label} style={{fontFamily:'Montserrat,sans-serif',fontSize:'0.68rem',fontWeight:700,padding:'4px 10px',borderRadius:4,letterSpacing:'0.5px',textTransform:'uppercase',...badgeStyle(b.type)}}>{b.label}</span>
          ))}
        </div>
        {showPrice && trip.tripDate && (
          <div style={{position:'absolute',bottom:12,right:12,background:'#0f2266',color:'#fff',fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.68rem',padding:'4px 10px',borderRadius:4,letterSpacing:'0.5px',textTransform:'uppercase',zIndex:2}}>
            📅 {trip.tripDate}
          </div>
        )}
      </div>

      {/* Body */}
      <div style={{padding:'24px 28px',display:'flex',flexDirection:'column'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,flexWrap:'wrap'}}>
          {(trip.tags||[]).map(t=>(
            <span key={t.label} style={{fontFamily:'Montserrat,sans-serif',fontSize:'0.7rem',fontWeight:700,padding:'3px 10px',borderRadius:4,textTransform:'uppercase',letterSpacing:'0.5px',...(tagStyles[t.type]||tagStyles.sport)}}>{t.label}</span>
          ))}
        </div>
        <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:800,fontSize:'1.15rem',color:'#1a1f36',marginBottom:6,lineHeight:1.3}}>{trip.title}</div>
        <div style={{fontSize:'0.83rem',color:'#7a8599',fontWeight:500,display:'flex',alignItems:'center',gap:5,marginBottom:4}}>📍 {trip.location}</div>
        {showPrice && trip.tripDate && (
          <div style={{fontSize:'0.78rem',color:'#2952c8',fontWeight:600,marginBottom:14}}>📅 {trip.tripDate}</div>
        )}
        {!showPrice && (
          <div style={{fontSize:'0.78rem',color:'#a8c4ff',fontWeight:600,marginBottom:14}}>📅 ** **** ****</div>
        )}
        {showPrice && !trip.tripDate && <div style={{marginBottom:14}} />}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {(trip.features||[]).map((f,i)=>(
            <span key={i} style={{fontSize:'0.75rem',fontWeight:600,color:'#4a5568',background:'#f5f7fc',border:'1px solid #dde4f5',padding:'4px 10px',borderRadius:50}}>{f}</span>
          ))}
        </div>
        <div style={{marginTop:'auto',display:'flex',alignItems:'flex-end',justifyContent:'space-between',paddingTop:16,borderTop:'1px solid #dde4f5'}}>
          <div>
            <div style={{fontSize:'0.72rem',fontWeight:600,color:'#7a8599',textTransform:'uppercase',letterSpacing:'0.5px'}}>Starting from</div>
            {showPrice ? (
              <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:'1.7rem',color:'#2952c8',lineHeight:1}}>
                {price} <span style={{fontSize:'0.9rem',fontWeight:700}}>PLN</span>
                <span style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:'1.7rem',color:'#2952c8',marginLeft:6}}>/ {eur} <span style={{fontSize:'0.9rem',fontWeight:700}}>EUR</span></span>
              </div>
            ) : (
              <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:'1.7rem',color:'#2952c8',lineHeight:1}}>
                *** <span style={{fontSize:'0.9rem',fontWeight:700}}>PLN</span>
                <span style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:'1.7rem',color:'#2952c8',marginLeft:6}}>/ *** <span style={{fontSize:'0.9rem',fontWeight:700}}>EUR</span></span>
              </div>
            )}
            <div style={{fontSize:'0.72rem',color:'#4a5568',marginTop:4}}>all inclusive</div>
            <div style={{fontSize:'0.72rem',fontWeight:700,color:'#22c55e',display:'flex',alignItems:'center',gap:4,marginTop:4}}>✓ {trip.included}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,alignItems:'flex-end'}}>
            <button onClick={()=>onBook(trip)} style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.82rem',background:'#2952c8',color:'#fff',padding:'10px 22px',borderRadius:8,border:'none',cursor:'pointer',whiteSpace:'nowrap'}}
              onMouseEnter={e=>e.currentTarget.style.background='#1a3a9e'} onMouseLeave={e=>e.currentTarget.style.background='#2952c8'}>Book Now</button>
            <button onClick={()=>onBook(trip)} style={{fontFamily:'Montserrat,sans-serif',fontWeight:600,fontSize:'0.78rem',color:'#2952c8',background:'#e8eefb',padding:'8px 22px',borderRadius:8,border:'none',cursor:'pointer',whiteSpace:'nowrap'}}
              onMouseEnter={e=>e.currentTarget.style.background='#d0dcf8'} onMouseLeave={e=>e.currentTarget.style.background='#e8eefb'}>View Details</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── BookingModal ── */
function BookingModal({trip, onClose, onToast}) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [guests, setGuests] = useState('1 person');

  const gallery = GALLERY[trip.activity] || GALLERY.default;

  const chosenEur = Math.round(chosenPrice * PLN_TO_EUR);
  const displayDate = trip.tripDate || '** **** ****';

  const confirm = () => {
    window.open('https://wa.me/48729648977', '_blank');
    onClose();
  };

  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}

      <div style={{background:'#f5f7fc',borderRadius:16,maxWidth:1000,width:'100%',boxShadow:'0 24px 80px rgba(15,34,102,0.35)',animation:'slideUp 0.3s ease-out',position:'relative',marginBottom:24}}>

          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div style={{fontSize:'2.2rem'}}>{trip.emoji}</div>
            <div>
              <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:'1.3rem',color:'#fff'}}>{trip.title}</div>
              <div style={{fontSize:'0.82rem',color:'rgba(255,255,255,0.7)',marginTop:2}}>📍 {trip.location} · 🏷️ {trip.activity} · 📅 {trip.durationLabel}</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'#fff',width:36,height:36,borderRadius:'50%',cursor:'pointer',fontSize:'1.1rem',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>

        <div className="modal-inner-grid" style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:0}}>
          <div style={{padding:'28px',borderRight:'1px solid #dde4f5'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gridTemplateRows:'220px 110px',gap:6,marginBottom:24,borderRadius:10,overflow:'hidden'}}>
              <img src={gallery[0]} alt="" style={{gridRow:'1 / 3',width:'100%',height:'100%',objectFit:'cover'}} />
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {gallery.slice(1,5).map((img,i)=><img key={i} src={img} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} />)}
              </div>
            </div>
            <h3 style={{fontFamily:'Montserrat,sans-serif',fontWeight:800,fontSize:'1.1rem',color:'#0f2266',marginBottom:10}}>Feel the thrill of the wild 🌿</h3>
            <p style={{fontSize:'0.9rem',color:'#4a5568',lineHeight:1.75,marginBottom:16}}>{trip.desc} Whether you're a first-timer or a seasoned adventurer, this package is carefully designed to deliver an unforgettable experience.</p>
            <h4 style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.85rem',color:'#1a1f36',marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>Most Popular Amenities</h4>

              {amenities.map(a=><div key={a} style={{fontSize:'0.85rem',color:'#1a1f36',background:'#e8eefb',padding:'8px 12px',borderRadius:8}}>{a}</div>)}

/* ── FiltersSidebar ── */
const ACTIVITY_TYPES = ['Kayaking','Skiing','Surfing','Hiking','Camping','City Tours'];
const DURATIONS = ['Weekend (2–3 days)','Short (4–5 days)','Week (6–7 days)'];
const PRICES = ['Under 400','400–700 PLN','700–1000 PLN','1000+ PLN'];
const DIFFICULTIES = ['All','Beginner','Intermediate','Advanced'];

function FiltersSidebar({onFilterChange, onShowToast}) {
  const [open, setOpen] = useState(false);
  const [activities, setActivities] = useState([]);
  const [selDurations, setSelDurations] = useState([]);
  const [selPrices, setSelPrices] = useState([]);
  const [selDiffs, setSelDiffs] = useState([]);

  const toggle = (arr, val) => arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val];
  const emit = (a,d,p,diff) => onFilterChange({activities:a,durations:d,prices:p,difficulties:diff});

  const tA = v => { const n=toggle(activities,v); setActivities(n); emit(n,selDurations,selPrices,selDiffs); };
  const tD = v => { const n=toggle(selDurations,v); setSelDurations(n); emit(activities,n,selPrices,selDiffs); };
  const tP = v => { const n=toggle(selPrices,v); setSelPrices(n); emit(activities,selDurations,n,selDiffs); };
  const tDiff = v => {
    if(v==='All'){setSelDiffs([]);emit(activities,selDurations,selPrices,[]);}
    else{const n=toggle(selDiffs,v);setSelDiffs(n);emit(activities,selDurations,selPrices,n);}
  };
  const clearAll = () => {setActivities([]);setSelDurations([]);setSelPrices([]);setSelDiffs([]);emit([],[],[],[]);onShowToast('Filters cleared.');};
  const totalActive = activities.length+selDurations.length+selPrices.length+selDiffs.length;

  return (
    <aside style={{background:'#fff',border:'1px solid #dde4f5',borderRadius:14,overflow:'hidden',boxShadow:'0 2px 16px rgba(41,82,200,0.10)',position:'sticky',top:88,alignSelf:'start'}}>
      <div onClick={()=>setOpen(o=>!o)} style={{background:'#2952c8',padding:'18px 22px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',userSelect:'none'}}>
        <h3 style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.88rem',color:'#fff',letterSpacing:1,textTransform:'uppercase',margin:0}}>🔍 Filters</h3>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {totalActive > 0 && (
            <button onClick={e=>{e.stopPropagation();clearAll();}} style={{fontFamily:'Montserrat,sans-serif',fontSize:'0.72rem',fontWeight:600,color:'rgba(255,255,255,0.75)',textDecoration:'underline',cursor:'pointer',background:'none',border:'none'}}>Clear</button>
          )}
          <span style={{color:'#fff',fontSize:'0.9rem',display:'inline-block',transform:open?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}}>▼</span>
        </div>
      </div>
      {open && (
        <>
          <div style={{borderBottom:'1px solid #dde4f5',padding:'18px 22px'}}>
            <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.75rem',color:'#4a5568',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Activity Type</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {ACTIVITY_TYPES.map(a=>(
                <label key={a} style={{display:'flex',alignItems:'center',gap:10,fontSize:'0.85rem',fontWeight:500,color:activities.includes(a)?'#2952c8':'#1a1f36',cursor:'pointer',padding:'4px 0'}}>
                  <input type="checkbox" checked={activities.includes(a)} onChange={()=>tA(a)} style={{accentColor:'#2952c8',width:16,height:16,cursor:'pointer'}} />{a}
                </label>
              ))}
            </div>
          </div>
          <div style={{borderBottom:'1px solid #dde4f5',padding:'18px 22px'}}>
            <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.75rem',color:'#4a5568',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Duration</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {DURATIONS.map(d=>(
                <label key={d} style={{display:'flex',alignItems:'center',gap:10,fontSize:'0.85rem',fontWeight:500,color:selDurations.includes(d)?'#2952c8':'#1a1f36',cursor:'pointer',padding:'4px 0'}}>
                  <input type="checkbox" checked={selDurations.includes(d)} onChange={()=>tD(d)} style={{accentColor:'#2952c8',width:16,height:16,cursor:'pointer'}} />{d}
                </label>
              ))}
            </div>
          </div>
          <div style={{borderBottom:'1px solid #dde4f5',padding:'18px 22px'}}>
            <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.75rem',color:'#4a5568',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Price Range (PLN / person)</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {PRICES.map(p=>(
                <label key={p} style={{display:'flex',alignItems:'center',gap:10,fontSize:'0.85rem',fontWeight:500,color:selPrices.includes(p)?'#2952c8':'#1a1f36',cursor:'pointer',padding:'4px 0'}}>
                  <input type="checkbox" checked={selPrices.includes(p)} onChange={()=>tP(p)} style={{accentColor:'#2952c8',width:16,height:16,cursor:'pointer'}} />{p}
                </label>
              ))}
            </div>
          </div>
          <div style={{padding:'18px 22px'}}>
            <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.75rem',color:'#4a5568',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Difficulty</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
              {DIFFICULTIES.map(d=>(
                <button key={d} onClick={()=>tDiff(d)} style={{fontFamily:'Montserrat,sans-serif',fontSize:'0.72rem',fontWeight:600,padding:'5px 12px',borderRadius:50,border:`1.5px solid ${(d==='All'?selDiffs.length===0:selDiffs.includes(d))?'#2952c8':'#dde4f5'}`,cursor:'pointer',background:(d==='All'?selDiffs.length===0:selDiffs.includes(d))?'#2952c8':'#fff',color:(d==='All'?selDiffs.length===0:selDiffs.includes(d))?'#fff':'#4a5568'}}>{d}</button>
              ))}
            </div>
          </div>
          <button onClick={()=>onShowToast('✅ Filters applied!')} style={{display:'block',width:'calc(100% - 44px)',margin:'0 22px 18px',background:'#2952c8',color:'#fff',border:'none',padding:12,borderRadius:8,fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.85rem',cursor:'pointer'}}
            onMouseEnter={e=>e.currentTarget.style.background='#1a3a9e'} onMouseLeave={e=>e.currentTarget.style.background='#2952c8'}>Show Results</button>
        </>
      )}
    </aside>
  );
}

        <FiltersSidebar onShowToast={showToast} onFilterChange={setFilters} />
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:12}}>
            <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.88rem',color:'#4a5568'}}>
              Showing <span style={{color:'#2952c8'}}>{sortedTrips.length} trip{sortedTrips.length!==1?'s':''}</span> available
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:'0.82rem',fontWeight:600,color:'#4a5568'}}>Sort:</span>
              <div style={{display:'flex',gap:4}}>
                {sortOptions.map(s=>(
                  <button key={s} onClick={()=>setActiveSort(s)} style={{fontFamily:'Montserrat,sans-serif',fontSize:'0.75rem',fontWeight:600,padding:'6px 14px',borderRadius:6,border:`1.5px solid ${activeSort===s?'#2952c8':'#dde4f5'}`,background:activeSort===s?'#2952c8':'#fff',color:activeSort===s?'#fff':'#4a5568',cursor:'pointer'}}>{s}</button>
                ))}
              </div>
            </div>
          </div>
          <div id="trips" style={{display:'flex',flexDirection:'column',gap:20}}>
            {sortedTrips.length===0
              ? <div style={{background:'#fff',border:'1px solid #dde4f5',borderRadius:14,padding:48,textAlign:'center',color:'#7a8599',fontFamily:'Montserrat,sans-serif',fontWeight:600}}>No trips match your filters.</div>
              : sortedTrips.map(t=><TripCard key={t.id} trip={t} onBook={setModalTrip} />)}
          </div>
        </div>
      </div>

      {/* INFO */}
      <div id="ourstory" className="info-sections-responsive" style={{maxWidth:1260,margin:'0 auto',padding:'0 32px 80px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:32}}>
        {[
          {icon:'🏔️',title:'Adventure Trips — Mountains & Trails',text:'NNA VITTALO has been organising adventure travel packages for over 1 year. From the iconic Tatra Mountains to the Alpine slopes of Austria, every trip is built around your passion for the outdoors. Our mountain trips include an experienced guide, all necessary equipment, accommodation and full board.'},
          {icon:'🌊',title:'Water Sports — Surf, Kayak & Sail',text:'From the calm lakes of Masuria to the powerful Atlantic swells of Portugal, NNA VITTALO offers water sports experiences for every level. Each package includes professional instruction, certified safety equipment and accommodation near the water. Our instructors are accredited and experienced with first-time participants.'},
        ].map(c=>(
          <div key={c.title} style={{background:'#fff',border:'1px solid #dde4f5',borderRadius:14,padding:36,boxShadow:'0 2px 16px rgba(41,82,200,0.10)',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:4,background:'linear-gradient(90deg,#2952c8 0%,#4a72e8 100%)'}} />
            <div style={{fontSize:'2.5rem',marginBottom:16}}>{c.icon}</div>
            <h2 style={{fontFamily:'Montserrat,sans-serif',fontWeight:800,fontSize:'1.25rem',color:'#1a1f36',marginBottom:12,lineHeight:1.3}}>{c.title}</h2>
            <p style={{fontSize:'0.9rem',color:'#4a5568',lineHeight:1.75}}>{c.text}</p>
          </div>
        ))}
      </div>

      {/* CONTACT */}
      <section id="contact" style={{background:'linear-gradient(135deg,#0f2266,#2952c8)',padding:'56px 32px',textAlign:'center'}}>
        <div style={{maxWidth:800,margin:'0 auto'}}>
          <h2 style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:'clamp(1.6rem,3vw,2.2rem)',color:'#fff',marginBottom:12}}>Questions? Get in Touch! 🗺️</h2>
          <p style={{color:'rgba(255,255,255,0.78)',fontSize:'0.95rem',marginBottom:32}}>Looking for a custom trip, group booking or just want to know more? Our team is here to help plan your perfect adventure.</p>
          <div style={{display:'flex',justifyContent:'center',gap:24,flexWrap:'wrap',marginBottom:36}}>
            {[{icon:'📧',label:'Email Us',val:'info@nnavittalo.com',href:'mailto:info@nnavittalo.com'},{icon:'📞',label:'Call / WhatsApp Us',val:'+48729648977',href:'https://wa.me/48729648977'}].map(c=>(
              <a key={c.label} href={c.href} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',gap:12,background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:10,padding:'14px 22px',textDecoration:'none',color:'#fff'}}>
                <span style={{fontSize:'1.4rem'}}>{c.icon}</span>
                <div style={{textAlign:'left'}}>
                  <div style={{fontSize:'0.7rem',color:'rgba(255,255,255,0.6)',fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>{c.label}</div>
                  <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.92rem'}}>{c.val}</div>
                </div>
              </a>
            ))}
          </div>
          <p style={{fontSize:'0.82rem',marginBottom:10,color:'rgba(255,255,255,0.6)'}}>Join our newsletter — be the first to hear about new trips, discounts and adventures!</p>
          <div style={{maxWidth:480,margin:'0 auto',display:'flex',gap:8}}>
            <input type="email" placeholder="Your email address..." value={nlEmail} onChange={e=>setNlEmail(e.target.value)}
              style={{flex:1,padding:'12px 18px',borderRadius:8,border:'2px solid rgba(255,255,255,0.3)',background:'rgba(255,255,255,0.1)',color:'#fff',fontSize:'0.88rem',fontFamily:'Open Sans,sans-serif',outline:'none'}} />
            <button onClick={subscribeNewsletter} style={{padding:'12px 22px',background:'#fff',color:'#2952c8',border:'none',borderRadius:8,fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:'0.82rem',cursor:'pointer',whiteSpace:'nowrap'}}>Subscribe</button>
          </div>
        </div>
      </section>

      <Footer />

      {modalTrip && <BookingModal trip={modalTrip} onClose={()=>setModalTrip(null)} onToast={showToast} />}

      <div style={{position:'fixed',bottom:28,left:'50%',transform:`translateX(-50%) translateY(${toast.show?0:80}px)`,background:'#0f2266',color:'#fff',padding:'12px 28px',borderRadius:50,fontFamily:'Montserrat,sans-serif',fontWeight:600,fontSize:'0.85rem',border:'2px solid #4a72e8',boxShadow:'0 8px 32px rgba(15,34,102,0.35)',zIndex:9999,transition:'transform 0.35s ease',pointerEvents:'none'}}>
        {toast.msg}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
